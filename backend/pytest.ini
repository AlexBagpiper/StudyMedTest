[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Ignore SQLAlchemy models that start with "Test"
filterwarnings =
    ignore::pytest.PytestCollectionWarning
markers =
    unit: fast isolated tests (no DB/Redis)
    integration: DB + Redis required
    security: security-focused tests (run on PR)
    resilience: requires testcontainers, slow
    load: locust-based load tests (manual trigger only)
